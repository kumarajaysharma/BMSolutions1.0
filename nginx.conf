# ─── BMSolutions SPA — nginx server block ───────────────────────
# Hardened for production. Headers enforce strict CSP, HSTS, and
# framing controls. Gzip enabled for all compressible assets.
# ────────────────────────────────────────────────────────────────

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Charset ──────────────────────────────────────────────────
    charset utf-8;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security   "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options      "nosniff"                                       always;
    add_header X-Frame-Options             "DENY"                                          always;
    add_header X-XSS-Protection            "1; mode=block"                                 always;
    add_header Referrer-Policy             "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy          "camera=(), microphone=(), geolocation=()"      always;
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline'; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: https:; \
         connect-src 'self' https://api.bms.bnlvconsulting.com; \
         frame-ancestors 'none';" always;

    # ── Static asset caching (hashed filenames from Vite) ────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Favicon / robots / sitemap — short cache ─────────────────
    location ~* \.(ico|txt|xml)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health endpoint — used by Docker HEALTHCHECK + GKE ───────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"bms-website"}';
        add_header Content-Type application/json;
    }

    # ── SPA fallback — all unresolved routes serve index.html ────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── Block common attack paths ─────────────────────────────────
    location ~* \.(env|git|htaccess|htpasswd|bak|sql|sh)$ {
        deny all;
        return 404;
    }

    # ── Error pages ───────────────────────────────────────────────
    error_page 404 /index.html;
}
